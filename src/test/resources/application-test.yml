spring:
  datasource:
    url: jdbc:tc:postgresql:17-alpine:///templatedb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  jpa:
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost/jwks

logging:
  level:
    org.hibernate.SQL: DEBUG
